<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Explore SkillSwap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            font-family: 'Inter', sans-serif;
            color: #2d3748;
        }
    </style>
</head>
<body class="min-h-screen p-8">

<div class="max-w-7xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-12 text-indigo-700">Explore Other Users</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div th:each="user : ${users}" class="bg-white rounded-lg shadow-md p-6 transform transition-transform hover:scale-105">

            <div class="flex items-center mb-4">
                <th:block th:if="${user.profile?.photoUrl != null}">
                    <img th:src="@{${user.profile.photoUrl}}"
                         alt="Profile" class="w-16 h-16 rounded-full border-2 border-indigo-400 object-cover">
                </th:block>
                <div th:unless="${user.profile?.photoUrl != null}"
                     class="w-16 h-16 rounded-full bg-indigo-400 flex items-center justify-center text-xl font-bold text-white border-2 border-indigo-400">
                    <span th:text="${user.username.substring(0,1).toUpperCase()}">U</span>
                </div>
                <div class="ml-4">
                    <h2 th:text="${user.profile?.fullName != null ? user.profile.fullName : user.username}" class="text-xl font-semibold text-gray-800">User Full Name</h2>
                    <p th:if="${user.profile?.pronouns != null}" th:text="${user.profile.pronouns}" class="text-sm text-gray-500">pronouns</p>
                </div>
            </div>
            <div th:if="${not #lists.isEmpty(user.skillsToTeach)}" class="mt-4">
                <h3 class="text-md font-semibold text-emerald-600">Can Teach:</h3>
                <ul class="flex flex-wrap gap-2 mt-2">
                    <li th:each="skill : ${user.skillsToTeach}" class="bg-emerald-100 text-emerald-800 text-xs px-3 py-1 rounded-full">
                        <span th:text="${skill.skill}">Skill</span>
                    </li>
                </ul>
            </div>

            <div th:if="${not #lists.isEmpty(user.skillsToLearn)}" class="mt-4">
                <h3 class="text-md font-semibold text-purple-600">Wants to Learn:</h3>
                <ul class="flex flex-wrap gap-2 mt-2">
                    <li th:each="skill : ${user.skillsToLearn}" class="bg-purple-100 text-purple-800 text-xs px-3 py-1 rounded-full">
                        <span th:text="${skill.skill}">Skill</span>
                    </li>
                </ul>
            </div>

            <div class="mt-6 text-center">
                <a th:href="@{/chat(recipient=${user.username})}" class="inline-block bg-indigo-500 text-white font-bold px-6 py-2 rounded-full shadow-md hover:bg-indigo-600 transition">
                    Connect
                </a>
            </div>

        </div> </div>
</div>

</body>
</html>
