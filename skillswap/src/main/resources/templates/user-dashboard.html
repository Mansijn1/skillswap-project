<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
          background: linear-gradient(135deg, #eef2f3 0%, #dfe9f3 100%);
          font-family: 'Inter', sans-serif;
          color: #2d3748;
        }
    </style>
</head>
<body class="min-h-screen p-8">

<div class="max-w-4xl mx-auto bg-white bg-opacity-80 backdrop-blur-lg rounded-2xl shadow-2xl p-10 border border-gray-100">

    <!-- Welcome Section -->
    <h1 class="text-3xl font-bold mb-8 text-gray-800">
        👋 Welcome,
        <span th:text="${user.username}" class="text-indigo-600">User</span>
    </h1>

    <!-- Profile Info -->
    <div class="flex items-center space-x-8 mb-10">
        <!-- Profile Image -->
        <img th:if="${user.profile != null and user.profile.photoUrl != null}"
             th:src="@{${user.profile.photoUrl}}" alt="Profile Photo"
             class="w-28 h-28 rounded-full object-cover border-4 border-indigo-300 shadow-md" />

        <div th:if="${user.profile == null or user.profile.photoUrl == null}"
             class="w-28 h-28 rounded-full bg-gradient-to-tr from-indigo-400 to-blue-300 flex items-center justify-center text-3xl font-bold text-white shadow-md">
            <span th:text="${user.username.substring(0,1).toUpperCase()}">U</span>
        </div>

        <!-- User Info -->
        <div class="space-y-3">
            <p class="text-lg flex items-center gap-2">
                📧 <span class="font-semibold">Email:</span>
                <span th:text="${user.profile != null ? user.profile.email : 'N/A'}" class="text-gray-700">user@example.com</span>
            </p>
            <p class="text-lg flex items-center gap-2">
                🌍 <span class="font-semibold">Pronouns:</span>
                <span th:text="${user.profile != null ? user.profile.pronouns : 'N/A'}" class="text-gray-700">he/him</span>
            </p>
        </div>
    </div>

    <!-- Skills to Learn -->
    <div class="mb-8">
        <h2 class="text-2xl font-bold mb-2 text-indigo-600">🎯 Skills You’re Excited to Learn</h2>
        <ul class="list-disc list-inside text-lg text-gray-700">
            <li th:each="skill : ${user.skillsToLearn}" th:text="${skill.skill}">JavaScript</li>
        </ul>
    </div>

    <!-- Skills to Teach -->
    <div class="mb-8">
        <h2 class="text-2xl font-bold mb-2 text-emerald-600">📚 Skills You’re Ready to Share</h2>
        <ul class="list-disc list-inside text-lg text-gray-700">
            <li th:each="skill : ${user.skillsToTeach}" th:text="${skill.skill}">HTML</li>
        </ul>
    </div>

    <!-- Buttons -->
    <div class="flex gap-4">
        <a th:href="@{/user/profile/edit}"
           class="inline-block bg-gradient-to-r from-indigo-500 to-blue-500 text-white font-bold px-6 py-3 rounded-xl shadow-md hover:from-indigo-600 hover:to-blue-600 transition">
            ✏️ Edit Profile
        </a>
        <a th:href="@{/logout}"
           class="inline-block bg-gray-800 text-white font-bold px-6 py-3 rounded-xl shadow-md hover:bg-gray-900 transition">
            🚪 Logout
        </a>
    </div>
</div>

</body>
</html>
