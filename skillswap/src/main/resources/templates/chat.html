<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; }
        .message-img { max-width: 200px; max-height: 200px; border-radius: 8px; cursor: pointer; }
        .message-img:hover { opacity: 0.8; }
        .file-link { display: block; word-break: break-all; }
    </style>
</head>
<body>

<div class="container mx-auto p-4">
    <div class="bg-white rounded-lg shadow-lg overflow-hidden">

        <!-- ✅ Error alert -->
        <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" role="alert">
            <span th:text="${error}"></span>
        </div>

        <!-- ✅ Header -->
        <div class="p-4 border-b">
            <h2 class="text-xl font-bold">
                Chat with
                <span th:text="${recipientUser?.profile?.fullName ?: recipientUser?.username ?: recipient}"></span>
            </h2>
        </div>

        <!-- ✅ Message List -->
        <div id="message-list" class="h-96 overflow-y-scroll p-4 space-y-4 bg-gray-50">
            <div th:each="msg : ${chatHistory}" th:if="${msg != null}"
                 th:classappend="${msg.senderUsername == #authentication?.name} ? 'text-right' : 'text-left'">

                <div class="inline-block p-2 rounded-lg max-w-xs flex flex-col"
                     th:classappend="${msg.senderUsername == #authentication?.name} ? 'bg-blue-500 text-white ml-auto' : 'bg-gray-200 text-gray-800 mr-auto'">

                    <!-- ✅ Text Message -->
                    <div th:if="${msg.type == 'TEXT' or (msg.type == null)}">
                        <p th:text="${msg.content}" class="break-words"></p>
                    </div>

                    <!-- ✅ File Message -->
                    <div th:if="${msg.type == 'FILE' and msg.content != null}">
                        <!-- ✅ Image Preview -->
                        <div th:if="${#strings.toLowerCase(msg.content)?.endsWith('.jpg')
                                     or #strings.toLowerCase(msg.content)?.endsWith('.jpeg')
                                     or #strings.toLowerCase(msg.content)?.endsWith('.png')
                                     or #strings.toLowerCase(msg.content)?.endsWith('.gif')}">

                            <img th:src="${msg.content}" alt="File Preview"
                                 class="message-img mb-1"
                                 onclick="openFile(this)"
                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                            <a th:href="${msg.content}"
                               th:text="'📎 Download ' + ${msg.content.substring(msg.content.lastIndexOf('/') + 1)}"
                               class="file-link hidden underline font-semibold text-sm" target="_blank"></a>
                        </div>

                        <!-- ✅ Non-image file -->
                        <div th:unless="${#strings.toLowerCase(msg.content)?.endsWith('.jpg')
                                        or #strings.toLowerCase(msg.content)?.endsWith('.jpeg')
                                        or #strings.toLowerCase(msg.content)?.endsWith('.png')
                                        or #strings.toLowerCase(msg.content)?.endsWith('.gif')}">
                            <a th:href="${msg.content}"
                               th:text="'📎 Download ' + ${msg.content.substring(msg.content.lastIndexOf('/') + 1)}"
                               class="file-link underline font-semibold text-sm" target="_blank"></a>
                        </div>
                    </div>

                    <!-- ✅ Timestamp -->
                    <span class="text-xs text-gray-400 mt-1 block"
                          th:classappend="${msg.senderUsername == #authentication?.name} ? 'text-right' : 'text-left'"
                          th:if="${msg.timestamp != null}"
                          th:text="${#temporals.format(msg.timestamp, 'hh:mm a')}"></span>
                </div>
            </div>

            <!-- ✅ Empty Chat -->
            <div th:if="${#lists.isEmpty(chatHistory)}" class="text-center text-gray-500 py-8">
                <p>Start a conversation!</p>
            </div>
        </div>

        <!-- ✅ Message Form -->
        <div class="p-4 border-t">
            <form id="message-form" class="flex items-center space-x-2">
                <input type="text" id="message-input" placeholder="Type a message..."
                       class="flex-grow rounded-lg p-2 border focus:outline-none focus:ring-2 focus:ring-blue-500"
                       autocomplete="off">
                <label for="file-upload" class="cursor-pointer bg-gray-200 hover:bg-gray-300 p-2 rounded-lg transition">📎</label>
                <input type="file" id="file-upload" accept="image/*,.pdf,.doc,.docx,.txt" class="hidden">
                <button type="submit" class="bg-blue-500 text-white p-2 rounded-lg hover:bg-blue-600 transition">Send</button>
            </form>
        </div>
    </div>
</div>

<!-- ✅ JS Setup -->
<script th:inline="javascript">
    /*<![CDATA[*/
    window.currentUser = [[${#authentication?.name}]] || '';
    window.recipient = [[${recipient}]] || '';
    /*]]>*/
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:src="@{/js/chat.js}"></script>

</body>
</html>
