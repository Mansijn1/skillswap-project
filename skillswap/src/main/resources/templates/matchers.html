<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mutual Matches</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        font-family: 'Inter', sans-serif;
        color: #2d3748;
        }
        .match-card {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.06);
        transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .match-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen p-8">

<div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-10 text-indigo-700">Your Mutual Matches</h1>

    <!-- ⭐ LOCATION FILTER FORM -->
    <form th:action="@{/user/matchers}" method="get" class="bg-white p-6 rounded-lg shadow-xl mb-12 flex flex-col sm:flex-row gap-4 items-end">
        <div class="flex-grow w-full sm:w-auto">
            <label for="location-filter" class="block text-sm font-medium text-gray-700 mb-1">Filter by Location (e.g., City)</label>
            <input type="text" id="location-filter" name="location" th:value="${location}"
                   placeholder="Enter a city or region (e.g., Bhilwara)"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-indigo-500 focus:border-indigo-500" />
        </div>
        <button type="submit" class="w-full sm:w-auto bg-indigo-600 text-white font-bold px-6 py-2.5 rounded-lg hover:bg-indigo-700 transition">
            Apply Filter
        </button>
        <!-- Clear Filter Button (Visible only if a filter is active) -->
        <a th:href="@{/user/matchers}" th:if="${location != null and !location.isEmpty()}"
           class="w-full sm:w-auto text-center text-sm text-gray-600 hover:text-red-600 px-4 py-2.5 rounded-lg border border-gray-300 hover:border-red-400 transition">
            Clear Filter
        </a>
    </form>
    <!-- END FILTER FORM -->

    <!-- Feedback Message Display -->
    <div th:if="${message}" class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4 mb-6 rounded-xl" role="alert">
        <p th:text="${message}"></p>
        <p th:if="${showProfileLink}"><a th:href="@{/user/profile/edit}" class="font-bold hover:underline">Go to Edit Profile</a></p>
    </div>

    <!-- Results Grid -->
    <div th:if="${not #lists.isEmpty(matches)}" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div th:each="match : ${matches}" class="match-card bg-white rounded-lg shadow-lg p-6 border-l-4 border-purple-500">
            <div th:with="user=${match.matchedUser}">

                <div class="flex items-center space-x-3 mb-4">
                    <!-- Profile Image / Placeholder -->
                    <div th:if="${user.profile?.photoUrl != null}">
                        <img th:src="@{${user.profile.photoUrl}}" alt="Profile" class="w-12 h-12 rounded-full object-cover border-2 border-purple-300">
                    </div>
                    <div th:unless="${user.profile?.photoUrl != null}" class="w-12 h-12 rounded-full bg-purple-200 flex items-center justify-center text-lg font-bold text-purple-800 border-2 border-purple-300">
                        <span th:text="${user.username.substring(0,1).toUpperCase()}">U</span>
                    </div>
                    <div>
                        <p class="text-xl font-bold text-purple-700" th:text="${user.profile?.fullName ?: user.username}"></p>
                        <p class="text-sm text-gray-500" th:text="${user.profile?.location} ?: 'Location not set'"></p>
                    </div>
                </div>

                <!-- THEY TEACH YOU (Your Learning Need) -->
                <div class="mt-4">
                    <h3 class="text-md font-semibold text-red-600">They Teach You:</h3>
                    <ul class="flex flex-wrap gap-2 mt-1">
                        <li th:each="skill : ${match.matchingTeachSkills}" class="bg-red-100 text-red-800 text-xs px-2 py-0.5 rounded-full" th:text="${skill}"></li>
                    </ul>
                </div>

                <!-- YOU TEACH THEM (Their Learning Need) -->
                <div class="mt-4">
                    <h3 class="text-md font-semibold text-blue-600">You Teach Them:</h3>
                    <ul class="flex flex-wrap gap-2 mt-1">
                        <li th:each="skill : ${match.matchingLearnSkills}" class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded-full" th:text="${skill}"></li>
                    </ul>
                </div>

                <div class="mt-6 text-right">
                    <a th:href="@{/chat(recipient=${user.username})}" class="bg-indigo-500 text-white font-bold px-4 py-2 rounded-lg hover:bg-indigo-600 transition">
                        Chat Now
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Message when no matches found (after filtering or initially) -->
    <div th:if="${#lists.isEmpty(matches) and !message}" class="mt-8 p-6 bg-white rounded-lg shadow-md text-center border-l-4 border-indigo-500">
        <p class="text-xl text-gray-500">No mutual matches found. Check your profile skills or adjust your filter.</p>
    </div>


</div>

</body>
</html>
