<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Chats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            font-family: 'Inter', sans-serif;
            color: #2d3748;
        }
        .chat-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.06);
        }

        .unread-highlight {
            border-left: 5px solid #10b981; /* Tailwind green-500 */
        }
    </style>
</head>
<body class="min-h-screen p-8">

<div class="max-w-xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-12 text-indigo-700">My Chats</h1>

    <div class="space-y-4">

        <div th:each="partnerMap : ${chatPartnersWithCount}"
             th:with="partner=${partnerMap.user}, unreadCount=${partnerMap.unreadCount}"
             class="chat-card bg-white rounded-lg transition duration-300 ease-in-out hover:shadow-lg hover:ring-2 ring-indigo-500"
             th:classappend="${unreadCount > 0} ? 'unread-highlight'">

            <a th:href="@{/chat(recipient=${partner.username})}"
               class="flex items-center space-x-4 p-4 w-full">

                <th:block th:if="${partner.profile?.photoUrl != null}">
                    <img th:src="@{${partner.profile.photoUrl}}"
                         alt="Profile"
                         class="w-14 h-14 rounded-full border-3 border-indigo-500 object-cover flex-shrink-0">
                </th:block>
                <div th:unless="${partner.profile?.photoUrl != null}"
                     class="w-14 h-14 rounded-full bg-indigo-500 flex items-center justify-center text-2xl font-bold text-white border-3 border-indigo-500 flex-shrink-0">
                    <span th:text="${partner.username.substring(0,1).toUpperCase()}">U</span>
                </div>

                <div class="flex-grow">
                    <span th:text="${partner.profile?.fullName ?: partner.username}"
                          class="text-xl font-semibold text-gray-800"
                          th:classappend="${unreadCount > 0} ? 'font-extrabold text-black' : ''"></span>

                </div>

                <div th:if="${unreadCount > 0}"
                     class="bg-green-500 text-white text-sm font-bold w-7 h-7 flex items-center justify-center rounded-full flex-shrink-0">
                    <span th:text="${unreadCount}">3</span>
                </div>
            </a>
        </div>

    </div>

    <div th:if="${#lists.isEmpty(chatPartnersWithCount)}"
         class="mt-8 p-6 bg-white rounded-lg shadow-md text-center text-gray-500 border-l-4 border-indigo-500">
        <p class="font-medium">You have no ongoing chats yet.</p>
    </div>
</div>

</body>
</html>
